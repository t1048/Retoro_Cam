<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Y2K デジカメ変換機 | DIGICAM 2003</title>
    <meta name="description" content="2000年代デジカメ風に写真を変換するLo-Fi Image Converter。ブラウザだけで完結。">
    <meta property="og:title" content="DIGICAM 2003 - Y2K デジカメ変換機">
    <meta property="og:description" content="2000年代デジカメ風に写真を変換。ノイズ、フラッシュ、日付スタンプなど。">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="DIGICAM 2003 - Y2K デジカメ変換機">
    <meta name="twitter:description" content="2000年代デジカメ風に写真を変換するLo-Fi Image Converter">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a1a">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1a1a1a;
            color: #e0e0e0;
            overscroll-behavior: none;
        }

        .preview-container {
            position: relative;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0) 0%, rgba(0, 0, 0, 1) 100%);
            border: 2px solid #444;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            overflow: hidden;
            min-height: 200px;
        }

        .compare-view {
            position: relative;
            width: 100%;
            line-height: 0;
        }

        .compare-view img {
            display: block;
            width: 100%;
            height: auto;
        }

        #originalClip {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
        }

        #originalClip img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .compare-handle {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 3px;
            background: #00ff9d;
            box-shadow: 0 0 8px #00ff9d;
            transform: translateX(-50%);
            pointer-events: none;
            z-index: 15;
        }

        .compare-slider {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: ew-resize;
            z-index: 20;
            margin: 0;
        }

        .scanlines::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0) 0%, rgba(0, 0, 0, 0.25) 100%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .retro-btn {
            background: linear-gradient(to bottom, #e0e0e0 0%, #bdbdbd 100%);
            border: 2px solid #888;
            border-bottom-color: #444;
            border-right-color: #444;
            color: #000;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: active 0.1s;
        }
        .retro-btn:active {
            border: 2px solid #444;
            border-bottom-color: #888;
            border-right-color: #888;
            transform: translate(1px, 1px);
        }

        .drop-zone.drag-over {
            border-color: #00ff9d;
            background-color: rgba(0, 255, 157, 0.08);
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #00ff9d;
            border: 2px solid #fff;
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 0 5px #00ff9d;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #555;
            border-radius: 2px;
        }

        @media (prefers-reduced-motion: reduce) {
            .retro-btn { transition: none; }
            .animate-pulse { animation: none; }
            #toast { transition: none; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-6 px-4 pb-20">

    <header class="w-full max-w-md mb-6 text-center">
        <h1 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-cyan-500" style="font-family: 'VT323', monospace;">
            DIGICAM 2003
        </h1>
        <p class="text-xs text-gray-400 mt-1">Lo-Fi Image Converter</p>
    </header>

    <main class="w-full max-w-md space-y-6">

        <div id="dropZone" class="bg-gray-800 rounded-lg p-4 border border-gray-700 shadow-lg space-y-3">
            <label class="block w-full cursor-pointer">
                <div class="retro-btn w-full py-3 text-center rounded text-sm flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    写真を選択
                </div>
                <input type="file" id="imageInput" accept="image/*" class="hidden" aria-label="写真を選択">
            </label>
            <label class="block w-full cursor-pointer md:hidden">
                <div class="retro-btn w-full py-3 text-center rounded text-sm flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    カメラで撮影
                </div>
                <input type="file" id="cameraInput" accept="image/*" capture="environment" class="hidden" aria-label="カメラで撮影">
            </label>
            <p class="text-center text-[10px] text-gray-500">ドラッグ＆ドロップにも対応</p>
        </div>

        <div id="previewArea" class="hidden">
            <div class="preview-container scanlines rounded-lg relative">
                <div id="compareView" class="compare-view">
                    <img id="resultImage" alt="変換後の画像" />
                    <div id="originalClip">
                        <img id="originalPreview" alt="元画像" />
                    </div>
                    <div id="compareHandle" class="compare-handle" style="left: 50%;"></div>
                    <input type="range" id="compareSlider" class="compare-slider" min="0" max="100" value="50" aria-label="Before/After 比較スライダー">
                </div>
                <div id="loading" class="absolute inset-0 flex items-center justify-center bg-black bg-opacity-70 hidden z-30">
                    <span class="text-green-400 font-mono animate-pulse">PROCESSING...</span>
                </div>
            </div>

            <div class="flex items-center justify-between mt-2">
                <p class="text-xs text-gray-500">画像を長押しで保存</p>
                <label class="flex items-center gap-2 text-xs text-gray-400 cursor-pointer">
                    <input type="checkbox" id="compareToggle" class="rounded" checked>
                    Before/After
                </label>
            </div>

            <div class="mt-6 bg-gray-800 p-4 rounded-lg border border-gray-700">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-green-400 font-mono text-sm">SETTINGS</h3>
                    <span id="dateDisplay" class="text-xs text-orange-400 font-mono"></span>
                </div>

                <div class="space-y-4">
                    <div class="flex items-center justify-between">
                        <span class="text-sm text-gray-300">Date Stamp</span>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="dateToggle" class="sr-only peer" checked role="switch" aria-checked="true">
                            <div class="w-11 h-6 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-orange-500"></div>
                        </label>
                    </div>

                    <div class="flex items-center justify-between">
                        <span class="text-sm text-gray-300">Force 4:3 Ratio</span>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="ratioToggle" class="sr-only peer" role="switch" aria-checked="false">
                            <div class="w-11 h-6 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-orange-500"></div>
                        </label>
                    </div>

                    <div>
                        <label for="dateInput" class="text-xs text-gray-400 block mb-1">Timestamp Text</label>
                        <input id="dateInput" type="text" class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-orange-300 font-mono text-sm focus:outline-none focus:ring-2 focus:ring-orange-500 placeholder:text-gray-500" placeholder="'03 01 01 00:00">
                        <p class="text-[10px] text-gray-500 mt-1">例: '03 08 21 21:15</p>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label for="datePositionSelect" class="text-xs text-gray-400 block mb-1">Stamp Position</label>
                            <select id="datePositionSelect" class="w-full bg-gray-900 border border-gray-700 rounded px-2 py-2 text-sm">
                                <option value="bottom-right">右下</option>
                                <option value="bottom-left">左下</option>
                            </select>
                        </div>
                        <div>
                            <label for="dateFontSelect" class="text-xs text-gray-400 block mb-1">Stamp Font</label>
                            <select id="dateFontSelect" class="w-full bg-gray-900 border border-gray-700 rounded px-2 py-2 text-sm">
                                <option value="courier">Courier</option>
                                <option value="press-start">Press Start 2P</option>
                            </select>
                        </div>
                    </div>

                    <div class="flex items-center justify-between">
                        <span class="text-sm text-gray-300">Show Seconds</span>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="showSecondsToggle" class="sr-only peer" role="switch" aria-checked="false">
                            <div class="w-11 h-6 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-orange-500"></div>
                        </label>
                    </div>

                    <div>
                        <div class="flex justify-between text-xs mb-1">
                            <span class="text-gray-400">Resolution (Pixels)</span>
                            <span id="resolutionValue" class="text-green-400 font-mono">100%</span>
                        </div>
                        <input type="range" id="resolutionRange" min="10" max="100" value="100" aria-label="解像度" aria-valuemin="10" aria-valuemax="100" aria-valuenow="100">
                    </div>

                    <div>
                        <div class="flex justify-between text-xs mb-1">
                            <span class="text-gray-400">Noise (ISO)</span>
                            <span id="noiseValue" class="text-green-400 font-mono">40</span>
                        </div>
                        <input type="range" id="noiseRange" min="0" max="100" value="40" aria-label="ノイズ" aria-valuemin="0" aria-valuemax="100" aria-valuenow="40">
                    </div>

                    <div>
                        <div class="flex justify-between text-xs mb-1">
                            <span class="text-gray-400">Flash Glow</span>
                            <span id="flashValue" class="text-green-400 font-mono">30</span>
                        </div>
                        <input type="range" id="flashRange" min="0" max="100" value="30" aria-label="フラッシュ" aria-valuemin="0" aria-valuemax="100" aria-valuenow="30">
                    </div>

                    <div>
                        <div class="flex justify-between text-xs mb-1">
                            <span class="text-gray-400">Vignette</span>
                            <span id="vignetteValue" class="text-green-400 font-mono">0</span>
                        </div>
                        <input type="range" id="vignetteRange" min="0" max="100" value="0" aria-label="ビネット" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
                    </div>

                    <div>
                        <div class="flex justify-between text-xs mb-1">
                            <span class="text-gray-400">Fringing</span>
                            <span id="aberrationValue" class="text-green-400 font-mono">0</span>
                        </div>
                        <input type="range" id="aberrationRange" min="0" max="100" value="0" aria-label="色収差" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
                    </div>

                    <div>
                        <div class="flex justify-between text-xs mb-1">
                            <span class="text-gray-400">JPEG Artifacts</span>
                            <span id="jpegArtifactValue" class="text-green-400 font-mono">0</span>
                        </div>
                        <input type="range" id="jpegArtifactRange" min="0" max="100" value="0" aria-label="JPEGブロックノイズ" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
                    </div>

                    <div>
                        <div class="flex justify-between text-xs mb-1">
                            <span class="text-gray-400">Color Depth</span>
                            <span id="colorDepthValue" class="text-green-400 font-mono">256</span>
                        </div>
                        <input type="range" id="colorDepthRange" min="16" max="256" value="256" step="16" aria-label="色数" aria-valuemin="16" aria-valuemax="256" aria-valuenow="256">
                    </div>
                </div>

                <div class="flex gap-2 mt-4">
                    <button id="updateBtn" class="flex-1 py-2 bg-gray-700 hover:bg-gray-600 text-green-400 font-mono text-sm border border-gray-600 rounded">
                        ↺ REFRESH
                    </button>
                    <button id="resetBtn" class="flex-1 py-2 bg-gray-700 hover:bg-gray-600 text-orange-400 font-mono text-sm border border-gray-600 rounded">
                        ↩ RESET
                    </button>
                </div>
            </div>

            <div class="mt-4 bg-gray-800 p-4 rounded-lg border border-gray-700">
                <h3 class="text-green-400 font-mono text-sm mb-4">PRESETS</h3>
                <div class="space-y-3">
                    <div class="flex gap-2">
                        <input id="presetNameInput" type="text" class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="Preset Name">
                        <button id="savePresetBtn" class="w-28 text-center retro-btn rounded text-xs px-2 py-2">💾 Save</button>
                    </div>
                    <div class="flex gap-2">
                        <select id="presetSelect" class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500">
                            <option value="">-- Load Preset --</option>
                        </select>
                        <button id="deletePresetBtn" class="w-28 text-center retro-btn rounded text-xs px-2 py-2 bg-red-400">🗑️ Delete</button>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-3 mt-6">
                <button id="downloadBtn" class="retro-btn py-3 rounded flex flex-col items-center justify-center">
                    <span class="text-lg">💾</span>
                    <span class="text-xs mt-1">保存</span>
                </button>
                <button id="copyBtn" class="retro-btn py-3 rounded flex flex-col items-center justify-center">
                    <span class="text-lg">📋</span>
                    <span class="text-xs mt-1">コピー</span>
                </button>
                <button id="shareBtn" class="retro-btn py-3 rounded flex flex-col items-center justify-center hidden">
                    <span class="text-lg">📤</span>
                    <span class="text-xs mt-1">共有</span>
                </button>
            </div>

            <div id="toast" class="fixed bottom-4 left-1/2 transform -translate-x-1/2 bg-green-500 text-black px-4 py-2 rounded shadow-lg transition-opacity duration-300 opacity-0 pointer-events-none z-50 font-bold text-sm">
                Copied!
            </div>
        </div>

    </main>

    <canvas id="canvas" class="hidden"></canvas>
    <canvas id="tempCanvas" class="hidden"></canvas>
    <canvas id="originalCanvas" class="hidden"></canvas>

    <script>
        const BUILTIN_PRESETS = {
            'Casio QV-3000': {
                noise: 55, flash: 45, vignette: 25, aberration: 15,
                resolution: 55, ratio43: true, dateStamp: true,
                jpegArtifact: 30, colorDepth: 64,
                datePosition: 'bottom-right', dateFont: 'courier', showSeconds: false
            },
            'Sony Cybershot 2003': {
                noise: 35, flash: 20, vignette: 40, aberration: 10,
                resolution: 75, ratio43: true, dateStamp: true,
                jpegArtifact: 15, colorDepth: 128,
                datePosition: 'bottom-right', dateFont: 'press-start', showSeconds: true
            }
        };

        const DEFAULT_SETTINGS = {
            noise: 40, flash: 30, vignette: 0, aberration: 0,
            resolution: 100, ratio43: false, dateStamp: true,
            jpegArtifact: 0, colorDepth: 256,
            datePosition: 'bottom-right', dateFont: 'courier', showSeconds: false
        };

        const SLIDER_MAP = [
            { range: 'resolutionRange', value: 'resolutionValue', format: v => `${v}%` },
            { range: 'noiseRange', value: 'noiseValue', format: v => String(v) },
            { range: 'flashRange', value: 'flashValue', format: v => String(v) },
            { range: 'vignetteRange', value: 'vignetteValue', format: v => String(v) },
            { range: 'aberrationRange', value: 'aberrationValue', format: v => String(v) },
            { range: 'jpegArtifactRange', value: 'jpegArtifactValue', format: v => String(v) },
            { range: 'colorDepthRange', value: 'colorDepthValue', format: v => String(v) }
        ];

        const imageInput = document.getElementById('imageInput');
        const cameraInput = document.getElementById('cameraInput');
        const dropZone = document.getElementById('dropZone');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const tempCanvas = document.getElementById('tempCanvas');
        const tempCtx = tempCanvas.getContext('2d');
        const originalCanvas = document.getElementById('originalCanvas');
        const originalCtx = originalCanvas.getContext('2d');
        const resultImage = document.getElementById('resultImage');
        const originalPreview = document.getElementById('originalPreview');
        const previewArea = document.getElementById('previewArea');
        const downloadBtn = document.getElementById('downloadBtn');
        const copyBtn = document.getElementById('copyBtn');
        const shareBtn = document.getElementById('shareBtn');
        const loading = document.getElementById('loading');
        const toast = document.getElementById('toast');
        const updateBtn = document.getElementById('updateBtn');
        const resetBtn = document.getElementById('resetBtn');
        const dateDisplay = document.getElementById('dateDisplay');
        const dateInput = document.getElementById('dateInput');
        const compareSlider = document.getElementById('compareSlider');
        const compareHandle = document.getElementById('compareHandle');
        const originalClip = document.getElementById('originalClip');
        const compareToggle = document.getElementById('compareToggle');
        const compareView = document.getElementById('compareView');

        const dateToggle = document.getElementById('dateToggle');
        const ratioToggle = document.getElementById('ratioToggle');
        const showSecondsToggle = document.getElementById('showSecondsToggle');
        const datePositionSelect = document.getElementById('datePositionSelect');
        const dateFontSelect = document.getElementById('dateFontSelect');
        const resolutionRange = document.getElementById('resolutionRange');
        const noiseRange = document.getElementById('noiseRange');
        const flashRange = document.getElementById('flashRange');
        const vignetteRange = document.getElementById('vignetteRange');
        const aberrationRange = document.getElementById('aberrationRange');
        const jpegArtifactRange = document.getElementById('jpegArtifactRange');
        const colorDepthRange = document.getElementById('colorDepthRange');

        const presetNameInput = document.getElementById('presetNameInput');
        const savePresetBtn = document.getElementById('savePresetBtn');
        const presetSelect = document.getElementById('presetSelect');
        const deletePresetBtn = document.getElementById('deletePresetBtn');

        let originalImage = null;
        let processTimer = null;
        let isDraggingSlider = false;
        let lastResultBlob = null;
        let lastResultObjectUrl = null;
        let processGeneration = 0;
        const defaultDateStamp = getCurrentDateStamp(false);

        function clamp(v) { return Math.min(255, Math.max(0, v)); }

        function revokeResultObjectUrl() {
            if (lastResultObjectUrl) {
                URL.revokeObjectURL(lastResultObjectUrl);
                lastResultObjectUrl = null;
            }
        }

        function getCurrentDateStamp(withSeconds) {
            const now = new Date();
            const y = `'${now.getFullYear().toString().slice(-2)}`;
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const d = String(now.getDate()).padStart(2, '0');
            if (withSeconds) {
                const h = String(now.getHours()).padStart(2, '0');
                const min = String(now.getMinutes()).padStart(2, '0');
                const s = String(now.getSeconds()).padStart(2, '0');
                return `${y} ${m} ${d} ${h}:${min}:${s}`;
            }
            return `${y} ${m} ${d}`;
        }

        function getDateStamp() {
            const text = dateInput.value.trim();
            if (text) return text;
            return getCurrentDateStamp(showSecondsToggle.checked);
        }

        function updateDateDisplay() {
            dateDisplay.innerText = getDateStamp();
        }

        function updateSliderDisplays() {
            SLIDER_MAP.forEach(({ range, value, format }) => {
                const el = document.getElementById(range);
                const display = document.getElementById(value);
                const v = parseInt(el.value, 10);
                display.textContent = format(v);
                el.setAttribute('aria-valuenow', v);
            });
        }

        function getSettingsFromUI() {
            return {
                noise: noiseRange.value,
                flash: flashRange.value,
                vignette: vignetteRange.value,
                aberration: aberrationRange.value,
                resolution: resolutionRange.value,
                ratio43: ratioToggle.checked,
                dateStamp: dateToggle.checked,
                dateText: dateInput.value,
                jpegArtifact: jpegArtifactRange.value,
                colorDepth: colorDepthRange.value,
                datePosition: datePositionSelect.value,
                dateFont: dateFontSelect.value,
                showSeconds: showSecondsToggle.checked
            };
        }

        function applySettings(settings) {
            noiseRange.value = settings.noise ?? DEFAULT_SETTINGS.noise;
            flashRange.value = settings.flash ?? DEFAULT_SETTINGS.flash;
            vignetteRange.value = settings.vignette ?? DEFAULT_SETTINGS.vignette;
            aberrationRange.value = settings.aberration ?? DEFAULT_SETTINGS.aberration;
            resolutionRange.value = settings.resolution ?? DEFAULT_SETTINGS.resolution;
            ratioToggle.checked = settings.ratio43 ?? DEFAULT_SETTINGS.ratio43;
            dateToggle.checked = settings.dateStamp ?? DEFAULT_SETTINGS.dateStamp;
            jpegArtifactRange.value = settings.jpegArtifact ?? DEFAULT_SETTINGS.jpegArtifact;
            colorDepthRange.value = settings.colorDepth ?? DEFAULT_SETTINGS.colorDepth;
            datePositionSelect.value = settings.datePosition ?? DEFAULT_SETTINGS.datePosition;
            dateFontSelect.value = settings.dateFont ?? DEFAULT_SETTINGS.dateFont;
            showSecondsToggle.checked = settings.showSeconds ?? DEFAULT_SETTINGS.showSeconds;
            if (settings.dateText !== undefined) dateInput.value = settings.dateText;
            dateToggle.setAttribute('aria-checked', dateToggle.checked);
            ratioToggle.setAttribute('aria-checked', ratioToggle.checked);
            showSecondsToggle.setAttribute('aria-checked', showSecondsToggle.checked);
            updateSliderDisplays();
            updateDateDisplay();
        }

        function resetSettings() {
            applySettings({ ...DEFAULT_SETTINGS, dateText: getCurrentDateStamp(DEFAULT_SETTINGS.showSeconds) });
            scheduleProcessImage(true);
            showToast('設定をリセットしました');
        }

        function isBuiltinPreset(name) {
            return Object.prototype.hasOwnProperty.call(BUILTIN_PRESETS, name);
        }

        function getPresets() {
            try {
                const presets = localStorage.getItem('y2kPresets');
                return presets ? JSON.parse(presets) : {};
            } catch (e) {
                console.error('Could not parse presets from localStorage', e);
                return {};
            }
        }

        function savePresets(presets) {
            localStorage.setItem('y2kPresets', JSON.stringify(presets));
        }

        function updatePresetList() {
            const presets = getPresets();
            const currentVal = presetSelect.value;
            presetSelect.innerHTML = '<option value="">-- Load Preset --</option>';

            const builtinGroup = document.createElement('optgroup');
            builtinGroup.label = 'Built-in';
            for (const name of Object.keys(BUILTIN_PRESETS)) {
                const option = document.createElement('option');
                option.value = `builtin:${name}`;
                option.textContent = name;
                builtinGroup.appendChild(option);
            }
            presetSelect.appendChild(builtinGroup);

            const userNames = Object.keys(presets);
            if (userNames.length > 0) {
                const userGroup = document.createElement('optgroup');
                userGroup.label = 'Custom';
                for (const name of userNames) {
                    const option = document.createElement('option');
                    option.value = `user:${name}`;
                    option.textContent = name;
                    userGroup.appendChild(option);
                }
                presetSelect.appendChild(userGroup);
            }
            presetSelect.value = currentVal;
        }

        function handleSavePreset() {
            const name = presetNameInput.value.trim();
            if (!name) {
                alert('プリセット名を入力してください');
                return;
            }
            if (isBuiltinPreset(name)) {
                alert('組み込みプリセット名は使用できません');
                return;
            }
            const presets = getPresets();
            presets[name] = getSettingsFromUI();
            savePresets(presets);
            updatePresetList();
            presetSelect.value = `user:${name}`;
            presetNameInput.value = '';
            showToast(`プリセット「${name}」を保存しました`);
        }

        function handleLoadPreset() {
            const val = presetSelect.value;
            if (!val) return;

            let settings;
            if (val.startsWith('builtin:')) {
                settings = BUILTIN_PRESETS[val.slice(8)];
            } else if (val.startsWith('user:')) {
                settings = getPresets()[val.slice(5)];
            }
            if (settings) {
                applySettings(settings);
                scheduleProcessImage(true);
                showToast('プリセットを読み込みました');
            }
        }

        function handleDeletePreset() {
            const val = presetSelect.value;
            if (!val || !val.startsWith('user:')) {
                alert('削除するカスタムプリセットを選択してください');
                return;
            }
            const name = val.slice(5);
            if (confirm(`プリセット「${name}」を削除しますか？`)) {
                const presets = getPresets();
                delete presets[name];
                savePresets(presets);
                updatePresetList();
                showToast(`プリセット「${name}」を削除しました`);
            }
        }

        function scheduleProcessImage(fullQuality = false) {
            clearTimeout(processTimer);
            const delay = fullQuality ? 0 : 150;
            processTimer = setTimeout(() => {
                processImage(originalImage, !fullQuality && isDraggingSlider);
            }, delay);
        }

        async function loadImageFromFile(file) {
            if (typeof createImageBitmap === 'function') {
                try {
                    const bitmap = await createImageBitmap(file, { imageOrientation: 'from-image' });
                    const c = document.createElement('canvas');
                    c.width = bitmap.width;
                    c.height = bitmap.height;
                    c.getContext('2d').drawImage(bitmap, 0, 0);
                    bitmap.close();
                    const img = new Image();
                    img.src = c.toDataURL('image/jpeg', 0.95);
                    await new Promise((resolve, reject) => {
                        img.onload = resolve;
                        img.onerror = reject;
                    });
                    return img;
                } catch (e) {
                    console.warn('createImageBitmap failed, falling back', e);
                }
            }
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => resolve(img);
                    img.onerror = reject;
                    img.src = event.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        async function handleFile(file) {
            if (!file || !file.type.startsWith('image/')) return;
            loading.classList.remove('hidden');
            previewArea.classList.remove('hidden');
            try {
                originalImage = await loadImageFromFile(file);
                updateOriginalPreview();
                scheduleProcessImage(true);
            } catch (e) {
                console.error(e);
                showToast('画像の読み込みに失敗しました');
                loading.classList.add('hidden');
            }
        }

        function handleImageUpload(e) {
            const file = e.target.files[0];
            if (file) handleFile(file);
            e.target.value = '';
        }

        function updateOriginalPreview() {
            if (!originalImage) return;
            const maxDim = 1024;
            let w = originalImage.width, h = originalImage.height;
            if (w > maxDim || h > maxDim) {
                if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
                else { w = Math.round(w * maxDim / h); h = maxDim; }
            }
            originalCanvas.width = w;
            originalCanvas.height = h;
            originalCtx.drawImage(originalImage, 0, 0, w, h);
            originalPreview.src = originalCanvas.toDataURL('image/jpeg', 0.85);
        }

        function getMaxDimension(preview) {
            if (preview) return 512;
            const mem = navigator.deviceMemory || 4;
            return mem <= 2 ? 768 : mem <= 4 ? 1024 : 1536;
        }

        function calculateDimensions(img, forceRatio, maxDimension) {
            let sourceX = 0, sourceY = 0, sourceW = img.width, sourceH = img.height;
            let targetWidth, targetHeight;

            if (forceRatio) {
                const targetRatio = 4 / 3;
                const currentRatio = img.width / img.height;
                if (currentRatio > targetRatio) {
                    const newWidth = img.height * targetRatio;
                    sourceX = (img.width - newWidth) / 2;
                    sourceW = newWidth;
                } else {
                    const newHeight = img.width / targetRatio;
                    sourceY = (img.height - newHeight) / 2;
                    sourceH = newHeight;
                }
                targetWidth = maxDimension;
                targetHeight = Math.round(maxDimension * 0.75);
            } else {
                if (sourceW > maxDimension || sourceH > maxDimension) {
                    if (sourceW > sourceH) {
                        targetHeight = Math.round((sourceH * maxDimension) / sourceW);
                        targetWidth = maxDimension;
                    } else {
                        targetWidth = Math.round((sourceW * maxDimension) / sourceH);
                        targetHeight = maxDimension;
                    }
                } else {
                    targetWidth = sourceW;
                    targetHeight = sourceH;
                }
            }
            return { sourceX, sourceY, sourceW, sourceH, targetWidth, targetHeight };
        }

        function applyColorDepth(data, levels) {
            if (levels >= 256) return;
            const step = 256 / levels;
            for (let i = 0; i < data.length; i += 4) {
                data[i] = clamp(Math.round(data[i] / step) * step);
                data[i + 1] = clamp(Math.round(data[i + 1] / step) * step);
                data[i + 2] = clamp(Math.round(data[i + 2] / step) * step);
            }
        }

        function applyJpegArtifacts(targetWidth, targetHeight, amount) {
            if (amount <= 0) return Promise.resolve();
            const quality = Math.max(0.05, 1 - amount / 120);
            return new Promise((resolve) => {
                const jpegData = canvas.toDataURL('image/jpeg', quality);
                const img = new Image();
                img.onload = () => {
                    ctx.drawImage(img, 0, 0, targetWidth, targetHeight);
                    resolve();
                };
                img.onerror = resolve;
                img.src = jpegData;
            });
        }

        function drawDateStamp(targetWidth, targetHeight) {
            const fontSize = Math.floor(targetHeight * (dateFontSelect.value === 'press-start' ? 0.035 : 0.05));
            const fontFamily = dateFontSelect.value === 'press-start'
                ? '"Press Start 2P", monospace'
                : '"Courier New", Courier, monospace';
            ctx.font = `bold ${fontSize}px ${fontFamily}`;
            const dateStr = getDateStamp();
            const marginX = targetWidth * 0.05;
            const marginY = targetHeight * 0.05;

            ctx.fillStyle = '#ffaa00';
            ctx.shadowColor = 'rgba(0,0,0,0.8)';
            ctx.shadowBlur = 4;
            ctx.shadowOffsetX = 2;
            ctx.shadowOffsetY = 2;

            if (datePositionSelect.value === 'bottom-left') {
                ctx.textAlign = 'left';
                ctx.fillText(dateStr, marginX, targetHeight - marginY);
            } else {
                ctx.textAlign = 'right';
                ctx.fillText(dateStr, targetWidth - marginX, targetHeight - marginY);
            }

            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;
        }

        async function processImage(img, preview = false) {
            if (!img) return;
            const generation = ++processGeneration;
            loading.classList.remove('hidden');

            await new Promise(requestAnimationFrame);
            if (generation !== processGeneration) return;

            const noiseAmount = parseInt(noiseRange.value, 10);
            const flashAmount = parseInt(flashRange.value, 10);
            const vignetteAmount = parseInt(vignetteRange.value, 10);
            const aberrationAmount = parseInt(aberrationRange.value, 10) / 1000;
            const resolutionScale = parseInt(resolutionRange.value, 10) / 100;
            const jpegArtifactAmount = parseInt(jpegArtifactRange.value, 10);
            const colorDepth = parseInt(colorDepthRange.value, 10);
            const forceRatio = ratioToggle.checked;
            const maxDimension = getMaxDimension(preview);

            const { sourceX, sourceY, sourceW, sourceH, targetWidth, targetHeight } =
                calculateDimensions(img, forceRatio, maxDimension);

            canvas.width = targetWidth;
            canvas.height = targetHeight;

            if (resolutionScale < 1.0) {
                const smallW = Math.max(1, Math.floor(targetWidth * resolutionScale));
                const smallH = Math.max(1, Math.floor(targetHeight * resolutionScale));
                tempCanvas.width = smallW;
                tempCanvas.height = smallH;
                tempCtx.drawImage(img, sourceX, sourceY, sourceW, sourceH, 0, 0, smallW, smallH);
                ctx.imageSmoothingEnabled = false;
                ctx.drawImage(tempCanvas, 0, 0, smallW, smallH, 0, 0, targetWidth, targetHeight);
                ctx.imageSmoothingEnabled = true;
            } else {
                ctx.drawImage(img, sourceX, sourceY, sourceW, sourceH, 0, 0, targetWidth, targetHeight);
            }

            const imageData = ctx.getImageData(0, 0, targetWidth, targetHeight);
            const data = imageData.data;
            const originalData = new Uint8ClampedArray(data);

            for (let i = 0; i < data.length; i += 4) {
                let r = data[i];
                let g = data[i + 1];
                let b = data[i + 2];

                g = g * 1.02;
                b = b * 1.02;

                if (noiseAmount > 0) {
                    const noise = (Math.random() - 0.5) * noiseAmount;
                    r += noise;
                    g += noise;
                    b += noise;
                }

                const factor = 1.1;
                const intercept = 128 * (1 - factor);
                r = r * factor + intercept;
                g = g * factor + intercept;
                b = b * factor + intercept;

                data[i] = clamp(r);
                data[i + 1] = clamp(g);
                data[i + 2] = clamp(b);
            }

            applyColorDepth(data, colorDepth);

            if (aberrationAmount > 0) {
                for (let i = 0; i < data.length; i += 4) {
                    const x = (i / 4) % targetWidth;
                    const y = Math.floor((i / 4) / targetWidth);
                    const dx = x - targetWidth / 2;
                    const dy = y - targetHeight / 2;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const shift = dist * aberrationAmount;
                    const r_index = (Math.round(x - shift) + Math.round(y) * targetWidth) * 4;
                    const b_index = (Math.round(x + shift) + Math.round(y) * targetWidth) * 4;
                    if (r_index >= 0 && r_index < data.length) data[i] = originalData[r_index];
                    if (b_index >= 0 && b_index < data.length) data[i + 2] = originalData[b_index];
                }
            }

            ctx.putImageData(imageData, 0, 0);

            await applyJpegArtifacts(targetWidth, targetHeight, jpegArtifactAmount);
            if (generation !== processGeneration) return;

            if (flashAmount > 0) {
                ctx.globalCompositeOperation = 'screen';
                const gradient = ctx.createRadialGradient(
                    targetWidth / 2, targetHeight / 2, targetWidth / 10,
                    targetWidth / 2, targetHeight / 2, targetWidth * 0.8
                );
                const flashOpacity = flashAmount / 200;
                gradient.addColorStop(0, `rgba(255, 255, 220, ${flashOpacity})`);
                gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, targetWidth, targetHeight);
                ctx.globalCompositeOperation = 'source-over';
            }

            if (vignetteAmount > 0) {
                const radius = Math.sqrt(targetWidth ** 2 + targetHeight ** 2) / 2;
                const gradient = ctx.createRadialGradient(
                    targetWidth / 2, targetHeight / 2, 0,
                    targetWidth / 2, targetHeight / 2, radius
                );
                const vignetteOpacity = vignetteAmount / 100;
                gradient.addColorStop(0, 'rgba(0, 0, 0, 0)');
                gradient.addColorStop(0.4, 'rgba(0, 0, 0, 0)');
                gradient.addColorStop(1, `rgba(0, 0, 0, ${vignetteOpacity})`);
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, targetWidth, targetHeight);
            }

            if (dateToggle.checked) {
                drawDateStamp(targetWidth, targetHeight);
            }

            canvas.toBlob((blob) => {
                if (generation !== processGeneration) return;
                lastResultBlob = blob;
                revokeResultObjectUrl();
                lastResultObjectUrl = URL.createObjectURL(blob);
                resultImage.src = lastResultObjectUrl;
                loading.classList.add('hidden');
            }, 'image/jpeg', 0.85);
        }

        function updateCompareClip(value) {
            originalClip.style.clipPath = `inset(0 ${100 - value}% 0 0)`;
            compareHandle.style.left = `${value}%`;
        }

        function setupCompareView() {
            compareSlider.addEventListener('input', () => updateCompareClip(compareSlider.value));
            compareToggle.addEventListener('change', () => {
                compareView.style.display = compareToggle.checked ? 'block' : 'none';
            });
            updateCompareClip(compareSlider.value);
        }

        function setupLongPressSave() {
            let pressTimer = null;
            const start = () => {
                pressTimer = setTimeout(() => {
                    if (lastResultBlob) {
                        downloadBlob(lastResultBlob);
                        showToast('ダウンロードしました');
                    }
                }, 600);
            };
            const cancel = () => clearTimeout(pressTimer);
            resultImage.addEventListener('touchstart', start, { passive: true });
            resultImage.addEventListener('touchend', cancel);
            resultImage.addEventListener('touchmove', cancel);
            resultImage.addEventListener('contextmenu', (e) => e.preventDefault());
        }

        function downloadBlob(blob) {
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.download = `y2k_photo_${Date.now()}.jpg`;
            link.href = url;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function setupDragDrop() {
            ['dragenter', 'dragover'].forEach(evt => {
                dropZone.addEventListener(evt, (e) => {
                    e.preventDefault();
                    dropZone.classList.add('drag-over');
                });
            });
            ['dragleave', 'drop'].forEach(evt => {
                dropZone.addEventListener(evt, (e) => {
                    e.preventDefault();
                    dropZone.classList.remove('drag-over');
                });
            });
            dropZone.addEventListener('drop', (e) => {
                const file = e.dataTransfer.files[0];
                if (file) handleFile(file);
            });
        }

        function setupSliderListeners() {
            const ranges = [
                resolutionRange, noiseRange, flashRange,
                vignetteRange, aberrationRange, jpegArtifactRange, colorDepthRange
            ];
            ranges.forEach(range => {
                range.addEventListener('pointerdown', () => { isDraggingSlider = true; });
                range.addEventListener('pointerup', () => {
                    isDraggingSlider = false;
                    scheduleProcessImage(true);
                });
                range.addEventListener('input', () => {
                    updateSliderDisplays();
                    scheduleProcessImage(false);
                });
            });
        }

        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.remove('opacity-0');
            setTimeout(() => toast.classList.add('opacity-0'), 2000);
        }

        dateInput.value = defaultDateStamp;
        updateDateDisplay();
        updateSliderDisplays();

        document.addEventListener('DOMContentLoaded', () => {
            updatePresetList();
            setupCompareView();
            setupLongPressSave();
            setupDragDrop();
            setupSliderListeners();

            if (navigator.share && navigator.canShare) {
                shareBtn.classList.remove('hidden');
            }

            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').catch(console.warn);
            }
        });

        imageInput.addEventListener('change', handleImageUpload);
        cameraInput.addEventListener('change', handleImageUpload);
        updateBtn.addEventListener('click', () => scheduleProcessImage(true));
        resetBtn.addEventListener('click', resetSettings);

        dateToggle.addEventListener('change', () => {
            dateToggle.setAttribute('aria-checked', dateToggle.checked);
            scheduleProcessImage(true);
        });
        ratioToggle.addEventListener('change', () => {
            ratioToggle.setAttribute('aria-checked', ratioToggle.checked);
            scheduleProcessImage(true);
        });
        showSecondsToggle.addEventListener('change', () => {
            showSecondsToggle.setAttribute('aria-checked', showSecondsToggle.checked);
            if (!dateInput.value.trim()) {
                dateInput.value = getCurrentDateStamp(showSecondsToggle.checked);
            }
            updateDateDisplay();
            scheduleProcessImage(true);
        });
        datePositionSelect.addEventListener('change', () => scheduleProcessImage(true));
        dateFontSelect.addEventListener('change', () => scheduleProcessImage(true));
        dateInput.addEventListener('input', () => {
            updateDateDisplay();
            scheduleProcessImage(true);
        });

        savePresetBtn.addEventListener('click', handleSavePreset);
        presetSelect.addEventListener('change', handleLoadPreset);
        deletePresetBtn.addEventListener('click', handleDeletePreset);

        downloadBtn.addEventListener('click', () => {
            if (lastResultBlob) {
                downloadBlob(lastResultBlob);
                showToast('ダウンロードしました');
            }
        });

        copyBtn.addEventListener('click', async () => {
            try {
                if (!lastResultBlob) return;
                await navigator.clipboard.write([
                    new ClipboardItem({ 'image/jpeg': lastResultBlob })
                ]);
                showToast('コピーしました！');
            } catch (err) {
                console.error(err);
                showToast('コピーに失敗しました');
            }
        });

        shareBtn.addEventListener('click', async () => {
            try {
                if (!lastResultBlob) return;
                const file = new File([lastResultBlob], `y2k_photo_${Date.now()}.jpg`, { type: 'image/jpeg' });
                if (navigator.canShare({ files: [file] })) {
                    await navigator.share({
                        files: [file],
                        title: 'DIGICAM 2003',
                        text: 'Y2Kデジカメ風に変換した写真'
                    });
                }
            } catch (err) {
                if (err.name !== 'AbortError') {
                    console.error(err);
                    showToast('共有に失敗しました');
                }
            }
        });
    </script>
</body>
